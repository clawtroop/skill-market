version: '3.8'

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: skillmarket
      POSTGRES_PASSWORD: skillmarket
      POSTGRES_DB: skillmarket
    ports:
      - "5432:5432"
    volumes:
      - skillmarket_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skillmarket -d skillmarket"]
      interval: 5s
      timeout: 5s
      retries: 5

  skill-market:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: 4000
      DATABASE_URL: postgres://skillmarket:skillmarket@db:5432/skillmarket
      # 生产请通过 .env / 部署平台覆盖这些；以下默认值仅为本地起容器不报错。
      # 火山原生 SDK 用不带 -s3 的域名（华东2上海）。
      TOS_ENDPOINT: ${TOS_ENDPOINT:-https://tos-cn-shanghai.volces.com}
      TOS_ACCESS_KEY: ${TOS_ACCESS_KEY:-dummy}
      TOS_SECRET_KEY: ${TOS_SECRET_KEY:-dummy}
      TOS_BUCKET: ${TOS_BUCKET:-nanobee-dev}
      TOS_REGION: ${TOS_REGION:-cn-shanghai}
      # 必须与实际上传路径 + SQL 里的 tos_object_key 对齐（上传时多套了一层 skills/）。
      TOS_PREFIX: ${TOS_PREFIX:-skill-market-mcp/skills/}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:4000}
      # For local dev you can point INGEST_CATALOG_ROOT to the reference inside the container via volume if needed
      SKILL_MARKET_INGEST_CATALOG_ROOT: ${SKILL_MARKET_INGEST_CATALOG_ROOT:-/data/reference-skills}
    ports:
      - "4000:4000"

volumes:
  skillmarket_pgdata:
