# 敏感配置模板 —— 请勿把填好真值的版本提交进仓库！
# 用法：复制为 secret.yaml，填入真实值后 kubectl apply；或用 CI / 密钥管理系统注入。
#
# stringData 直接写明文（apply 时 K8s 自动 base64 编码），比手动 base64 更省事。
apiVersion: v1
kind: Secret
metadata:
  name: skill-market-secret
  labels:
    app: skill-market
type: Opaque
stringData:
  # Postgres 连接串（务必指向运维已建表+导入 499 行数据的那个库；服务需能内网访问）
  DATABASE_URL: "postgres://USER:PASSWORD@DB_HOST:5432/DBNAME"
  # 火山 TOS 访问密钥（控制台「密钥管理」申请，建议用仅授权 TOS 的子账号）
  TOS_ACCESS_KEY: "REPLACE_ME"
  TOS_SECRET_KEY: "REPLACE_ME"
  # 可选：保护 /internal/* 路径的内部 token（不设则该守卫关闭）
  # INTERNAL_API_TOKEN: "REPLACE_ME_STRONG_RANDOM"
